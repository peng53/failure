class HeatNode {
	constructor(partialPath){
		this.children = {};
		this.isLeaf = false;
		this.fullPath = partialPath;
	}
	getChild(name){
		if (this.isLeaf){
			// leaves can't have children
			return null;
		} else {
			if (name in this.children){
				return this.children[name];
			} else {
				this.children[name] = new HeatNode(this.fullPath+'.'+name);
				return this.children[name];
			}
		}
	}
};


function defParse(lines){
	const r = new Map();
	const defaultType = 'j';
	let name, path, type, opts, notes;
	for (const line of lines){
		if (line.trim().length==0){
			continue;
		}
		if (line.trim().startsWith('~')){
			// separator
			r.set(line.trim(),{path: line.trim(), type: '~'});
			continue;
		}
		[name,path,type,opts,notes] = line.split(',');
		if (!name || !path || name.trim().length==0 || path.trim().length==0){
			console.error(`invalid name "${name}" or invalid path "${path}"`);
			r.set(line,{type: 'err'});
			continue;
		}
		if (r.has(name)){
			console.error(`${name} already defined, ignoring`);
			continue;
		} else {
			console.log(path);
			r.set(name,{path: path.split('|'), type: type ? type: defaultType, opts: opts, notes: notes});
		}
	}
	return r;
}
function traceJson(j,path){
	const dpath = path.split('.');
	let vnode = j;
	for (const crumb of dpath){
		if (vnode && (typeof vnode == 'object') && crumb in vnode){
			// vnode of the previous loop should always be an object
			// because 'leaves' cannot be midpoints
			vnode = vnode[crumb];
		} else {
			console.error(`lost.. json does not have ${path}`);
			return undefined;
		}
	}
	return vnode;
}
function setJson(j,path,newValue){
	const dpath = path.split('.');
	let pvnode = undefined;
	let vnode = j;
	for (const crumb of dpath){
		if (crumb in vnode){
			pvnode = vnode;
			vnode = vnode[crumb];
		} else {
			console.error(`lost.. json does not have ${path}`);
			alert(`lost.. json does not have ${path}`);
			return;
		}
	}
	pvnode[dpath[dpath.length-1]] = newValue;
}

function check_paths(paths){
	// check whether all paths are unique and not subsets of each other
	// example call
	// check_paths(['hello','helloworld','hello.world','hello.fresh.ton'])
	//  'hello' won't appear in list
	const badPaths = [];
	const hm = new HeatNode('');
	let pathParts, current, badPath;
	for (const path of paths){
		pathParts = path.split('.');
		current = hm;
		badPath = false;
		for (const part of pathParts){
			if (current.isLeaf){
				console.error(`leaf mid branch at ${path}`);
				badPaths.push(current.fullPath);
				badPath = true;
				break;
			}
			current = current.getChild(part);
			if (current==null){
				console.error(`leaf mid branch at ${path}. (trying to get child of a leaf)`);
				badPath = true;
				break;
			}
		}
		if (badPath){
			badPaths.push('.'+path);
			continue;
		}
		// at this point, we should be at the end of path
		if (current && Object.keys(current.children).length>0){
			console.error(`${path} has children but is leaf`);
			badPath = true;
		}
		if (current.isLeaf){
			console.error(`${path} is already marked a leaf, path not unique`);
			badPath = true;
		} else {
			current.isLeaf = true;
			// this is the best outcome for path
		}
		if (badPath){
			badPaths.push('.'+path);
		}
	}
	return badPaths;
}

function helper_check_mydefs(){
	// gather all paths from mydefs
	const paths = [];
	for (const [name,def] of mydefs.entries()){
		if (def.type in hookMap){
			paths.push(...def.path);
		}
	}
	return check_paths(paths);
}

function createControl(name,hook,cv){
	let htype = 'j';
	if (hook.type!=htype && hook.type in hookMap){
		// j is compatible with all values
		if (cv===null || cv.constructor == hookMap[hook.type].t){
			// null is always compatible
			// validate hook.type is compatible with cv's type
			htype = hook.type;
		}
	}
	const ctrl = hookMap[htype].f(hook.opts,cv);
	ctrl.querySelector('.name').textContent = name;
	if (hook.notes?.trim().length){
		ctrl.querySelector('.notes').textContent = hook.notes;
	}
	if (cv==null && htype!='b' && htype!='j'){
		ctrl.querySelector('.valIsNull').checked = ctrl.querySelector('.val').disabled = true;
	}
	if (hook.type != htype){
		ctrl.classList.add('typeMismatch');
		//hook.type = htype;
	}
	return ctrl;
}

function tryUpdate(){
	let v;
	for (const [name,hook] of mydefs.entries()){
		v = undefined;
		switch (hook.type){
			case 's':
				v = (hook.control.querySelector('.valIsNull')?.checked) ? null : hook.control.querySelector('.val').value;
				break;
			case 'n':
				v = (hook.control.querySelector('.valIsNull')?.checked) ? null : Number(hook.control.querySelector('.val').value);
				break;
			case 'b':
				v = JSON.parse(hook.control.querySelector('input:checked').value);
				break;
			case 'j':
				v = hook.control.querySelector('.val').value;
				try {
					v = JSON.parse((v.length>0) ? v : null);
				} catch (parseErr){
					alert(`Validate '${name}' : '${parseErr.message}'`);
					hook.control.scrollIntoView();
					return;
				}
				break;
			case 'dt':
				v = (hook.control.querySelector('.valIsNull')?.checked) ? null : hook.control.querySelector('.val').value;
				break;
			case 'l':
				if (hook.control.querySelector('.valIsNull')?.checked){
					v = null;
				} else {
					v = hook.control.querySelector('.val').value;
					if (v.length==0){
						v = [];
					} else {
						v = v.split('\n');
						if (hook.opts=='n'){
							v = v.map(l=>Number(l));
						}
					}
				}
				break;
			case 'm':
				if (hook.control.querySelector('.valIsNull')?.checked){
					v = null;
				} else {
					v = Array.from(hook.control.querySelector('.val').selectedOptions).map(o=>o.text);
				}
				break;
			case '~':
				break;
			default:
				console.log(`skipping type ${hook.type}`);
				break;
		}
		if (v!==undefined){
			for (const mpath of hook.path){
				console.log(`updating ${name} at ${mpath} to ${v}`);
				setJson(myjson,mpath,v);
			}
		}
	}
	updateArea.value = JSON.stringify(myjson,null,3);
	updateAreaDets.querySelector('.areaTimestamp').textContent = new Date();
	updateAreaDets.open = true;
	updateAreaDets.scrollIntoView();
	
}

		a.click();
		URL.revokeObjectURL(a.href);
	} else {
		alert('Textarea is empty!');
	}
}

function loadFileOnTextarea(i){
	const t = i.parentElement.parentElement.querySelector('textarea');
	if (i.files.length==1){
		const reader = new FileReader();
		reader.onload = ()=>{
			t.value = reader.result;
			console.log(i.files[0].name);
		};
		reader.onerror = ()=>{alert('Error reading file')};
		reader.readAsText(i.files[0]);
	}
}

</script>

Number Control,a_number,n,,'n' denotes a number control
Date Control,a_date,dt,,'dt' denotes a date control
List Control,a_list,l,,'l' denotes a homogeneous list control. a 'n' in opts denotes it as a number list.
~~Header 2- Even more basic Types
Enum String Control,an_object.enum_string,s,apple|banana,Having a pipe delimited list in opts creates an enum control.
Enum Number Control,an_object.enum_number,n,1|2|3|4|5,Similar with numbers, the 'n' causes the result to be cast to number in output
Bool Control,an_object.a_bool,b,,'b' denotes a bool control
Json Control,an_object.a_json,j,,'j' denotes a json control

Array Indexing Value 0,indexable.0,s,,Using a number in the path can refer to that index in an array
Array Indexing Value 1 Child Key,indexable.1.obj-in-array,b,,You can even refer to objects inside arrays
~~Header 4- Multi-path
Multi-path string,repeated-string|repeated-string-dup,s,,You can include multiple paths with pipes. The same value will be put to every path.

Invalid Path,myinvalidpath,s,,This path will result in an error
