<script>
'use strict';
var myjson = undefined;
var mydefs = undefined;

function defParse(lines){
	const r = new Map();
	const defaultType = 'j';
	let name, path, type, opts, notes;
	for (const line of lines){
		if (line.trim().length==0){
			continue;
		}
		if (line.trim().startsWith('~')){
			// separator
			r.set(line.trim(),{path: line.trim(), type: '~'});
			continue;
		}
		[name,path,type,opts,notes] = line.split(',');
		//console.log(name,path,type,opts,notes);
		if (!name || !path || name.trim().length==0 || path.trim().length==0){
			console.error(`invalid name "${name}" or invalid path "${path}"`);
			r.set(line,{type: 'err'});
			continue;
		}
		if (r.has(name)){
			console.error(`${name} already defined, ignoring`);
			continue;
		} else {
			console.log(path);
			r.set(name,{path: path.split('|'), type: type ? type: defaultType, opts: opts, notes: notes});
		}
	}
	return r;
}
function traceJson(j,path){
	const dpath = path.split('.');
	let vnode = j;
	for (const crumb of dpath){
		if (vnode && (typeof vnode == 'object') && crumb in vnode){
			// vnode of the previous loop should always be an object
			// because 'leaves' cannot be midpoints
			vnode = vnode[crumb];
		} else {
			console.error(`lost.. json does not have ${path}`);
			return undefined;
		}
	}
	return vnode;
}
function setJson(j,path,newValue){
	const dpath = path.split('.');
	let pvnode = undefined;
	let vnode = j;
	for (const crumb of dpath){
		if (crumb in vnode){
			pvnode = vnode;
			vnode = vnode[crumb];
		} else {
			console.error(`lost.. json does not have ${path}`);
			alert(`lost.. json does not have ${path}`);
			return;
		}
	}
	pvnode[dpath[dpath.length-1]] = newValue;
}
function createEnumControl(name,hook,v){
	const clone = tEnumControl.content.cloneNode(true);
	const fs = clone.firstElementChild;
	const sel = fs.querySelector('select');
	for (const e of hook.opts.trim().split('|')){
		sel.appendChild(document.createElement('option')).textContent = e;
	}
	if (v!=null){
		fs.querySelector('.val').value = v;
	}
	return fs;
}
function createStringControl(name,hook,v){
	if (hook.opts?.trim().length > 0){
		// string is enumerated
		return createEnumControl(name,hook,v);
	}
	const clone = tStringControl.content.cloneNode(true);
	const fs = clone.firstElementChild;
	if (hook.type=='n'){
		const vi = fs.querySelector('.val');
		fs.querySelector('.labelType').textContent = vi.type = 'number';
		vi.placeholder = '0';
		vi.step = '0.01';
		vi.required = true;
	} else if (hook.type=='dt'){
		fs.querySelector('.labelType').textContent = 'date';
		fs.querySelector('.val').type = 'datetime-local';
	} else {
	}
	if (v!=null){
		fs.querySelector('.val').value = v;
	}
	return fs;
}
function createBoolControl(name,hook,v){
	const clone = tBoolControl.content.cloneNode(true);
	const fs = clone.firstElementChild;
	Array.from(fs.querySelectorAll('input')).forEach(i=>i.name=name);
	let rinput;
	switch (v){
		case true:
			rinput = '.radioTrue';
			break;
		case false:
			rinput = '.radioFalse';
			break;
		case null:
			rinput = '.radioNull';
			break;
		default:
			rinput = '.radioNull';
			break;
	};
	fs.querySelector(rinput).checked = true;
	return fs;
}
/*
function createNumberControl(name,hook,v){
	// opts has value means enum
	// plan is to allow range via other symbols
//~ 	const controlType = (hook.opts?.trim().length>0) ? 'enum' : 'num';
//~ 	if (controlType=='enum'){
	if (hook.opts?.trim().length>0){
		return createEnumControl(name,hook,v);
	}
	const clone = tNumberControl.content.cloneNode(true);
	const fs = clone.firstElementChild;
	if (v!=null){
		fs.querySelector('.val').value = v;
	}
	return fs;
}
*/
function createJsonControl(name,hook,v){
	const clone = tJsonControl.content.cloneNode(true);
	const fs = clone.firstElementChild;
	fs.querySelector('.val').value = JSON.stringify(v,null,3);
	fs.querySelector('.val').rows = Math.min(40, 2 + Array.from(fs.querySelector('.val').value.matchAll('\n')).length);
	return fs;
}
function createListControl(name,hook,v){
	const clone = tFlatListControl.content.cloneNode(true);
	const fs = clone.firstElementChild;
	if (v!=null){
		fs.querySelector('.val').value = v.join('\n');
		fs.querySelector('.val').rows = Math.min(40, 1 + v.length);
	}
	if (hook.opts=='n'){
		fs.querySelector('.labelType').textContent = 'numeric list';
	}
	return fs;
}
/*
function createDateControl(name,hook,v){
	const clone = tDateControl.content.cloneNode(true);
	const fs = clone.firstElementChild;
	if (v!=null){
		fs.querySelector('.val').value = v;
	}
	return fs;
}*/
function createSep(name,hook){
	const ele = document.createElement('h2');
	ele.textContent = hook.path.replaceAll('~','');
	return ele;
}
const hookMap = 
	{'s':createStringControl
	,'b':createBoolControl
	,'n':createStringControl
	,'j':createJsonControl
	,'dt':createStringControl
	,'l':createListControl
};

function createControl(name,hook,cv){
	// map out function call to type
	// call function with arguments, default to type 'j' if not available
	const ctrl = hookMap[(hook.type in hookMap) ? hook.type : 'j'](name,hook,cv);
	ctrl.querySelector('.name').textContent = name;
	if (hook.notes?.trim().length){
		ctrl.querySelector('.notes').textContent = hook.notes;
	}
	if (hook.type!='b' && hook.type!='j' && cv==null){
		ctrl.querySelector('.valIsNull').checked = ctrl.querySelector('.val').disabled = true;
	}
	return ctrl;
}

function tryBuild(callbutton){
	try {
		myjson = JSON.parse(inputJson.value);
	} catch (parseErr){
		alert(`Invalid input: ${parseErr.message}`);
		return;
	}
	callbutton.hidden = inputJson.readOnly = inputDefs.readOnly = true;
	console.log('**input json**');
	console.log(myjson);
	mydefs = defParse(inputDefs.value.trim().split('\n'));
	console.log('**input defs**');
	console.log(mydefs);
	console.log('**sound out values in json**');
	let cn = undefined;
	let cv = undefined;
	const afrag = new DocumentFragment();
	for (const [name,hook] of mydefs.entries()){
		if (hook.type=='~'){
			afrag.appendChild(createSep(name,hook));
			gotoDef.appendChild(document.createElement('optgroup')).label = name;
		} else if (hook.type=='err'){
			cn = document.createElement('span');
			cn.classList.add('fieldError');
			cn.textContent = `Unable to create ${name}. Invalid DEF`;
			afrag.appendChild(cn);
		} else {
			cv = undefined;
			cv = traceJson(myjson,hook.path[0]);
			if (cv === undefined){
				// don't create the control if path is not valid
				// prevent trying to update this path
				cn = document.createElement('span');
				cn.classList.add('fieldError');
				cn.textContent = `Unable to create ${name} at ${hook.path}. Please update JSON or DEFS to remove this error.`;
				hook.type = '-';
				afrag.appendChild(cn);
				continue;
			}
			cn = createControl(name,hook,cv);
			if (cn){
				hook.control = afrag.appendChild(cn);
				hook.control.title = hook.path;
				gotoDef.appendChild(document.createElement('option')).textContent = name;
			}
		}
	}
	controls.appendChild(afrag);
	inputJsonDet.open = inputDefsDet.open = updateAreas.hidden = false;
}
function tryUpdate(){
	let v;
	for (const [name,hook] of mydefs.entries()){
		v = undefined;
		switch (hook.type){
			case 's':
				v = (hook.control.querySelector('.valIsNull').checked) ? null : hook.control.querySelector('.val').value;
				break;
			case 'n':
				v = (hook.control.querySelector('.valIsNull').checked) ? null : Number(hook.control.querySelector('.val').value);
				break;
			case 'b':
				v = JSON.parse(hook.control.querySelector('input:checked').value);
				break;
			case 'j':
				v = hook.control.querySelector('.val').value;
				try {
					v = JSON.parse((v.length>0) ? v : null);
				} catch (parseErr){
					alert(`Validate '${name}' : '${parseErr.message}'`);
					hook.control.scrollIntoView();
					return;
				}
				break;
			case 'dt':
				v = (hook.control.querySelector('.valIsNull').checked) ? null : hook.control.querySelector('.val').value;
				break;
			case 'l':
				if (hook.control.querySelector('.valIsNull').checked){
					v = null;
				} else {
					v = hook.control.querySelector('.val').value;
					if (v.length==0){
						v = [];
					} else {
						v = v.split('\n');
						if (hook.opts=='n'){
							v = v.map(l=>Number(l));
						}
					}
				}
				break;
			default:
				console.log(`skipping type ${hook.type}`);
				break;
		}
		if (v!==undefined){
			for (const mpath of hook.path){
				console.log(`updating ${name} at ${mpath} to ${v}`);
				setJson(myjson,mpath,v);
			}
		}
	}
	updateArea.value = JSON.stringify(myjson,null,3);
	updateAreaDets.querySelector('.areaTimestamp').textContent = new Date();
	updateAreaDets.open = true;
	updateAreaDets.scrollIntoView();
	
}

function toggleNull(rele){
	const valEle = rele.parentElement?.parentElement?.querySelector('.val');
	if (valEle){
		valEle.disabled = rele.checked;
	}
}
function validateFormat(rele){
	const valEle = rele.parentElement?.querySelector('.val');
	try {
		let j = JSON.parse(valEle.value);
		valEle.value = JSON.stringify(j,null,3);
		valEle.rows = Math.min(40, 2 + Array.from(valEle.value.matchAll('\n')).length);
	} catch(err){
		alert(`JSON is not valid: ${err.message}`);
	}
}
function toggleNotesEditable(){
	const notes = Array.from(controls.querySelectorAll('.notes'));
	const mode = controls.querySelector('.notesEd') ? 'false' : 'plaintext-only';
	notes.forEach(n=>{
		n.classList.toggle('notesEd');
		n.contentEditable = mode;
	});
}
function pullDefs(){
	const r = [];
	let notes;
	for (const [name,hook] of mydefs.entries()){
		if (hook.type=='~'){
			r.push(hook.path);
		} else if (hook.type in hookMap){
			notes = hook.control.querySelector('.notes').textContent.replace(',',';');
			r.push(`${name},${hook.path.join('|')},${hook.type},${hook.opts? hook.opts: ''},${notes}`);
		} else {
			console.error(`Unrecognized type ${hook.type}; skipping`)
			// ignored
		}
	}
	return r;
}
function exportDefsToDialog(){
	const r = pullDefs();
	defExported.querySelector('textarea').value = r.join('\n');
	defExported.show();
}
function gotoDefChange(key){
	const ctrl = mydefs.get(key).control;
	ctrl.scrollIntoView(false);
	ctrl.querySelector('.val').focus();
}
function save(par,filename){
	const ta = par.querySelector('textarea')?.value;
	if (ta?.length>0){
		const d = new Date();
		const b = new Blob([ta]);
		const a = document.createElement('a');
		a.href = URL.createObjectURL(b);
		a.download = `${d.getFullYear()}${d.getMonth()+1}${d.getDate()}${d.getHours()+1}${d.getMinutes()}_${filename}`;
		a.click();
		URL.revokeObjectURL(a.href);
	} else {
		alert('Textarea is empty!');
	}
}
</script>

<script>
/* ignore this */
'use strict';
class FSControls {
	static types = 
		{'s':tStringControl
		,'b':tBoolControl
		,'n':tStringControl
		,'j':tJsonControl
		,'dt':tStringControl
		,'l':tFlatListControl
	};
	static createControl(name,hook,cv){
		
	}
	constructor(type,name,notes){
		this.type = type;
		this.ctrl = (FSControls.types)[type].content.cloneNode(true);
		this.ctrl.querySelector('.name').textContent = name;
		if (notes?.trim().length){
			this.ctrl.querySelector('.notes').textContent = notes;
		}
	}
}
class StringControl extends FSControls {
	constructor(name,notes,v){
		super('s',name,notes);
		if (v==null){
			this.ctrl.querySelector('.valIsNull').checked = this.ctrl.querySelector('.val').disabled = true;
		} else {
			this.ctrl.querySelector('.val').value = v;
		}
	}
}
class NumberControl extends StringControl {
	constructor(name,notes,v){
		super(name,notes,v);
	}
}
