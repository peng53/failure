<script>
'use strict';
var myjson, mydefs;

class HeatNode {
	constructor(partialPath){
		this.children = {};
		this.isLeaf = false;
		this.fullPath = partialPath;
	}
	getChild(name){
		if (this.isLeaf){
			// leaves can't have children
			return null;
		} else {
			if (name in this.children){
				return this.children[name];
			} else {
				this.children[name] = new HeatNode(this.fullPath+'.'+name);
				return this.children[name];
			}
		}
	}
};

function check_paths(paths){
	// check whether all paths are unique and not subsets of each other
	// example call
	// check_paths(['hello','helloworld','hello.world','hello.fresh.ton'])
	//  'hello' won't appear in list
	const badPaths = [],
		hm = new HeatNode('');
	let pathParts, current, badPath;
	for (const path of paths){
		pathParts = path.split('.');
		current = hm;
		badPath = false;
		for (const part of pathParts){
			if (current.isLeaf){
				console.error(`leaf mid branch at ${path}`);
				badPaths.push(current.fullPath);
				badPath = true;
				break;
			}
			current = current.getChild(part);
			if (current==null){
				console.error(`leaf mid branch at ${path}. (trying to get child of a leaf)`);
				badPath = true;
				break;
			}
		}
		if (badPath){
			badPaths.push('.'+path);
			continue;
		}
		// at this point, we should be at the end of path
		if (current && Object.keys(current.children).length>0){
			console.error(`${path} has children but is leaf`);
			badPath = true;
		}
		if (current.isLeaf){
			console.error(`${path} is already marked a leaf, path not unique`);
			badPath = true;
		} else {
			current.isLeaf = true;
			// this is the best outcome for path
		}
		if (badPath){
			badPaths.push('.'+path);
		}
	}
	return badPaths;
}

function helper_check_mydefs(){
	// gather all paths from mydefs
	const paths = [];
	for (const [name,def] of mydefs.entries()){
		if (def.type in classHookMap){
			paths.push(...def.path);
		}
	}
	return check_paths(paths);
}

function defParse(lines,defaultType='j'){
	const r = new Map();
	let name, path, type, opts, notes, line;
	for (const lineWS of lines){
		line = lineWS.trim();
		if (line.length==0 || line.startsWith('#')){
			continue;
		} else if (line.startsWith('~')){
			// separator
			r.set(line,{path: line, type: '~'});
			continue;
		}
		[name,path,type,opts,notes] = line.split(',');
		if (!name || !path || name.trim().length==0 || path.trim().length==0){
			console.error(`invalid name "${name}" or invalid path "${path}"`);
			r.set(line,{type: 'err'});
			continue;
		} else if (r.has(name)){
			console.error(`${name} already defined, ignoring`);
			continue;
		} else {
			r.set(name,{path: path.split('|'), type: type ?? defaultType, opts: opts.trim(), notes: notes.trim()});
		}
	}
	return r;
}
function traceJson(j,path){
	const dpath = path.split('.');
	let vnode = j;
	for (const crumb of dpath){
		if (vnode && (typeof vnode == 'object') && crumb in vnode){
			// vnode of the previous loop should always be an object
			// because 'leaves' cannot be midpoints
			vnode = vnode[crumb];
		} else {
			console.error(`lost.. json does not have ${path}`);
			return undefined;
		}
	}
	return vnode;
}
function setJson(j,path,newValue){
	const dpath = path.split('.');
	let pvnode = undefined;
	let vnode = j;
	for (const crumb of dpath){
		if (crumb in vnode){
			pvnode = vnode;
			vnode = vnode[crumb];
		} else {
			console.error(`lost.. json does not have ${path}`);
			alert(`lost.. json does not have ${path}`);
			return;
		}
	}
	pvnode[dpath[dpath.length-1]] = newValue;
}

function createSep(name,hook){
	const ele = document.createElement('h2');
	ele.textContent = hook.path.replaceAll('~','');
	return ele;
}

		return this.control.querySelector('.val').value;
	}
	get isNull(){
		return this.control.querySelector('.valIsNull')?.checked;
	}
	get nullOrVal(){
		return (this.isNull) ? null : this.val;
	}
	
	static enumSubTypes(opts){
		// helper function to create enumcontrols
		const fs = tEnumControl.content.cloneNode(true).firstElementChild,
			sel = fs.querySelector('select');
		for (const e of opts.split('|')){
			sel.appendChild(document.createElement('option')).textContent = e;
		}
		return fs;
	}
}

		} else {

		}
	}

	}
}

		}
		let rad;
		switch (v){

			case false:

			case null:

	}

	}

}
class JsonFieldSet extends FieldSetControl {

		super(name,tJsonControl.content.cloneNode(true).firstElementChild);

		ta.value = JSON.stringify(v,null,3);

			this.control.scrollIntoView();
			return undefined;

		const v = this.control.querySelector('.val').value.trim();
		return v.length==0 || v=='null';
	}

class ListFieldSet extends FieldSetControl {

class MultiSelFieldSet extends FieldSetControl {
	constructor(name,opts,v){
		super(name,tMultiControl.content.cloneNode(true).firstElementChild);
		const sel = this.control.querySelector('select');
		const mopts = new Map();
		for (const [i,e] of opts.split('&').entries()){
			sel.appendChild(document.createElement('option')).textContent = e;
			// tbd check if already in map
			mopts.set(e,i);
		}
		if (v!=null){
			for (const ar of v){
				sel.options[mopts.get(ar)].selected = true;
			}
		} else {
			this.control.querySelector('.valIsNull').checked = this.control.querySelector('.val').disabled = true;
		}
	}
	get val(){
		return Array.from(this.control.querySelector('.val').selectedOptions).map(o=>o.text);
	}
}
class ObjectsFieldSet extends FieldSetControl {
	constructor(name,opts,v){
		super(name,tObjectsControl.content.cloneNode(true).firstElementChild);
		this.name = name;
		let cj,
			cont = this.control.querySelector('.vals');
		if (v==null){
			cj = tInnerObject.content.cloneNode(true).firstElementChild;
			cj.querySelector('.val').disabled = this.control.querySelector('.valIsNull').checked = true;
			cont.appendChild(cj);
		} else {
			for (const e of v){
				cj = tInnerObject.content.cloneNode(true).firstElementChild;
				cj.querySelector('.val').value = JSON.stringify(e,null,3);
				cont.appendChild(cj);
			}
		}
	}
	get val(){
		const v = Array.from(this.control.querySelectorAll('.val'));
		try {
			if (v.length==1){
				return JSON.parse(v[0].value);
			} else {
				let av = [],
					tx;
				for (const x of v){
					tx = x.value.trim(); 
					if (tx.length>0 && tx!='null'){
						av.push(tx);
					}
				}
				return JSON.parse(`[${av.join(',')}]`);
			}
		} catch(parseErr){
			alert(`Validate '${this.name}' : '${parseErr.message}'`);
			this.control.scrollIntoView();
			return undefined;
		}
	}
	static add(par){
		if (!(par.querySelector('.valIsNull').checked)){
			const cont = par.querySelector('.vals'),
				subCtrl = tInnerObject.content.cloneNode(true).firstElementChild;
			cont.appendChild(subCtrl);
		}
	}
	static div(par){
		if ((par.querySelector('.valIsNull').checked)){ return; }
		const cont = par.querySelector('.vals'),
			isCombined = par.querySelector('.innerVal');
		if (isCombined){
			try {
				let j = JSON.parse(isCombined.querySelector('.val').value),
					cj, t;
				for (const e of j){
					cj = tInnerObject.content.cloneNode(true).firstElementChild;
					t = JSON.stringify(e,null,3);
					cj.querySelector('.val').value = t;
					cj.querySelector('.val').rows = Math.min(40, 2 + Array.from(t.matchAll('\n')).length);
					cont.appendChild(cj);
				}
				cont.removeChild(isCombined);
			} catch(err){
				alert(`Failed to split, JSON invalid. ${err.message}`);
			}
		} else {
			let vs = [];
			for (const cj of cont.querySelectorAll('.val')){
				if (cj.value.length){
					vs.push(cj.value);
				}
			}
			try {
				let j = JSON.parse('['+vs.join(',')+']'),
					cmb = tInnerCmbObject.content.cloneNode(true).firstElementChild,
					t = JSON.stringify(j,null,3);
				cmb.querySelector('.val').value = t;
				cmb.querySelector('.val').rows = Math.min(40, 2 + Array.from(t.matchAll('\n')).length);
				cont.appendChild(cmb);
				
			} catch(err){
				alert(`Failed to combine, JSON invalid. ${err.message}`);
			}
			for (const cj of cont.querySelectorAll('.innerCval')){
				cont.removeChild(cj);
			}
		}
		const but = par.querySelector('.splDivButton');
		but.textContent = (but.textContent=='🖇') ? '📎' : '🖇';
	}
	static tbl(par){
		const inv = par.querySelector('.innerVal');
		if (!inv){
			alert('Combine values first!');
			return;
		}
		let name = par.querySelector('.name').textContent,
			opt = mydefs.get(name).opts.split('|').map(o=>o.split('=')),
			th = tableEdit.querySelector('thead tr'),
			tb = tableEdit.querySelector('tbody'),
			row, json;
		try {
			json = JSON.parse(inv.querySelector('textarea').value);
		} catch {
			alert('Cannot table invalid JSON!');
			return;
		}
		inv.querySelector('textarea').readOnly = true;
		tableEdit.querySelector('h2').textContent = name; 
		th.replaceChildren();
		for (const [o,t] of opt){
			th.appendChild(document.createElement('th')).textContent = o;
		}
		tb.replaceChildren();
		for (const e of json){
			row = tb.insertRow(-1);
			row.contentEditable = true;
			for (const [o,t] of opt){
				row.appendChild(document.createElement('td')).textContent = e[o];
			}
		}
		tableEdit.show();
	}
	static returnTable(){
		let name = tableEdit.querySelector('h2').textContent,
			opt = mydefs.get(name).opts.split('|').map(o=>o.split('=')),
			rows = Array.from(tableEdit.querySelectorAll('tbody tr')),
			json = JSON.parse(mydefs.get(name).control.querySelector('textarea').value),
			ctrl = mydefs.get(name).control.querySelector('textarea'),
			o,t,v;
		for (let i=0;i<rows.length;++i){
			for (let [j,ot] of opt.entries()){
				[o,t] = ot;
				v = rows[i].children[j].textContent;
				if (t!='s'){
					v = JSON.parse(v);
				}
				json[i][o] = v;
			}
		}
		ctrl.value = JSON.stringify(json,null,3);
		ctrl.readOnly = false;
		tableEdit.close();
	}
}

const classHookMap = 
	{s:{f:StringFieldSet, t: String}
	,b:{f:BoolFieldSet, t: Boolean}
	,n:{f:NumberFieldSet, t: Number}
	,j:{f:JsonFieldSet, St: Object}
	,dt:{f:DateFieldSet, t: String}
	,l:{f:ListFieldSet, t:Array}
	,m:{f:MultiSelFieldSet, t:Array}
	,o:{f:ObjectsFieldSet, t:Array}
};

function createControlClass(name,hook,cv){
	let htype = 'j';
	if (hook.type!=htype && hook.type in classHookMap){
		// j is compatible with all values
		if (cv===null || cv.constructor == classHookMap[hook.type].t){
			// null is always compatible
			// validate hook.type is compatible with cv's type
			htype = hook.type;
		}
	}
	const ctrl = new classHookMap[htype].f(name,hook.opts,cv);
	if (hook.notes?.length){
		ctrl.control.querySelector('.notes').textContent = hook.notes;
	}
	if (hook.type != htype){
		ctrl.control.classList.add('typeMismatch');
		errLog.value += `Type mismatch '${name}': ${hook.type} -> ${htype}\n\n`;
		hook.type = htype;
	}
	return ctrl;
}

const many2manyTypes = new Set(['s','b','n','dt']);

function tryBuild(){
	try {
		myjson = JSON.parse(inputJson.value);
	} catch (parseErr){
		alert(`Invalid input: ${parseErr.message}`);
		return;
	}
	if (jsonfileinput.files.length==1){
		outputFileName.value = jsonfileinput.files[0].name;
		document.title = `jsonhooks: ${outputFileName.value}`;
	}
	Array.from(document.querySelectorAll('.preBuildButton')).forEach(b=>b.hidden = true);
	inputJson.readOnly = inputDefs.readOnly = true;
	console.log('**input json**');
	console.log(myjson);
	mydefs = defParse(inputDefs.value.trim().split('\n'));
	console.log('**input defs**');
	console.log(mydefs);
	console.log('**sound out values in json**');
	let cn, cv, cvs, many2manyDetected;
	const afrag = new DocumentFragment();
	errLog.value = '';
	for (const [name,hook] of mydefs.entries()){
		if (hook.type=='~'){
			afrag.appendChild(createSep(name,hook));
			gotoDef.appendChild(document.createElement('optgroup')).label = name;
		} else if (hook.type=='err'){
			cn = document.createElement('span');
			cn.classList.add('fieldError');
			cn.textContent = `Unable to create ${name}. Invalid DEF`;
			afrag.appendChild(cn);
		} else {
			cv = undefined;
			many2manyDetected = false;
			try {
				if (many2manyTypes.has(hook.type)){
					cvs = [];
					for (const [i,p] of hook.path.entries()){
						cvs.push(traceJson(myjson,p));
						if (!many2manyDetected && i!=0 && cvs[0]!=cvs[i]){
							many2manyDetected = true;
						}
					}
					cv = cvs[0];
				} else {
					cv = traceJson(myjson,hook.path[0]);
				}
				if (cv === undefined){
					// don't create the control if path is not valid
					// prevent trying to update this path
					cn = document.createElement('span');
					cn.classList.add('fieldError');
					cn.textContent = `Unable to create ${name} at ${hook.path}. Please update JSON or DEFS to remove this error.`;
					errLog.value += `Value undefined '${name}' at '${hook.path}'\n\n`;
					hook.type = '-';
					afrag.appendChild(cn);
					continue;
				}
				cn = createControlClass(name,hook,cv);
				if (cn){
					hook.var = cn;
					hook.control = afrag.appendChild(cn.control);
					hook.control.title = hook.path.join('\n');
					gotoDef.appendChild(document.createElement('option')).textContent = name;
					if (many2manyDetected){
						errLog.value += `Multiple values mapped to single control: '${name}'\n pathes: ${hook.path}\n  ${cvs.join('\n  ')}\n\n`;
					}
				}
			} catch(err) {
				cn = document.createElement('span');
				cn.classList.add('fieldError');
				cn.textContent = `Exception creating ${name}. Check ${hook.path}. ${err.message}`;
				afrag.appendChild(cn);
				errLog.value += `Invalid path for '${name}' at '${hook.path}'\n\n`;
			}
		}
	}
	controls.appendChild(afrag);
	inputJsonDet.open = inputDefsDet.open = updateAreas.hidden = false;
	inputJson.ondrop = inputDefs.ondrop = undefined;
	if (errLog.value.length){
		buildLog.show();
	}
}

function tryUpdate(){
	if (!myjson || !mydefs){
		return;
	}
	let v;
	for (const [name,hook] of mydefs.entries()){
		v = undefined;
		if (hook.type in classHookMap){
			v = hook.var.nullOrVal;
			if (v===undefined){
				return;
			} else {
				for (const mpath of hook.path){
					console.log(`updating ${name} at ${mpath} to ${v}`);
					setJson(myjson,mpath,v);
				}
			}
		} else {
			switch (hook.type){
				case '~':
					break;
				default:
					console.log(`skipping type ${hook.type}`);
					break;
			}
		}
	}
	updateArea.value = JSON.stringify(myjson,null,3);
	updateAreaDets.querySelector('.areaTimestamp').textContent = new Date();
	updateAreaDets.open = true;
	updateAreaDets.scrollIntoView();
}

function toggleNull(rele){
	const v = Array.from(rele.parentElement?.parentElement?.querySelectorAll('.val'));
	for (const ta of v){
		ta.disabled = rele.checked;
	}
}
function validateFormat(){
	const v = event.target.parentElement.querySelector('.val');
	try {
		v.value = JSON.stringify(JSON.parse(v.value),null,3);
		v.rows = Math.min(40, 2 + Array.from(v.value.matchAll('\n')).length);
		alert('Valid!');
	} catch(err){
		alert(`JSON is not valid: ${err.message}`);
	}
}
function toggleNotesEditable(){
	const mode = controls.querySelector('.notesEd') ? 'false' : 'plaintext-only';
	for (const n of Array.from(controls.querySelectorAll('.notes'))){
		n.classList.toggle('notesEd');
		n.contentEditable = mode;
	}
}
function pullDefs(){
	const r = [];
	for (const [name,hook] of mydefs.entries()){
		if (hook.type=='~'){
			r.push(hook.path);
		} else if (hook.type in hookMap){
			r.push(`${name},${hook.path.join('|')},${hook.type},${hook.opts?? ''},${hook.control.querySelector('.notes').textContent.replace(',',';')}`);
		} else {
			console.error(`Unrecognized type ${hook.type}; skipping`);
		}
	}
	return r;
}
function exportDefsToDialog(){
	defExported.querySelector('textarea').value = pullDefs().join('\n');
	defExported.show();
}
function gotoDefChange(key){
	const ctrl = mydefs.get(key).control;
	ctrl.scrollIntoView(false);
	ctrl.querySelector('.val').focus();
}
function save(par,filename){
	const ta = par.querySelector('textarea')?.value;
	if (ta?.length>0){
		const d = new Date(), b = new Blob([ta]), a = document.createElement('a');
		a.href = URL.createObjectURL(b);
		a.download = `${d.getFullYear()}${d.getMonth()+1}${d.getDate()}${d.getHours()+1}${d.getMinutes()}_${filename}`;
		a.click();
		URL.revokeObjectURL(a.href);
	} else {
		alert('Textarea is empty!');
	}
}

function loadFileOnTextarea(i){
	const t = i.parentElement.parentElement.querySelector('textarea');
	if (i.files.length==1){
		const reader = new FileReader();
		reader.onload = ()=> t.value = reader.result;
		reader.onerror = ()=> alert('Error reading file');
		reader.readAsText(i.files[0]);
	}
}
function textareaFileDrop(event){
	if (event.dataTransfer.files.length==1){
		event.preventDefault();
		const reader = new FileReader();
		reader.onload = ()=> event.target.value = reader.result;
		reader.onerror = ()=> alert('Error reading file');
		reader.readAsText(event.dataTransfer.files[0]);
	}
}
function toggleWideView(){
	if (leftPane.style.height==''){
		container.style.display = 'block';
		leftPane.style.height = 'unset';
	} else {
		container.style.display = leftPane.style.height = '';
	}
}
function cancelTableEdit(){
	tableEdit.close();
	mydefs.get(tableEdit.querySelector('h2').textContent).control.querySelector('textarea').readOnly = false;
}
</script>

		</details>
		<details id='inputDefsDet' open>
			<summary>Input Defs</summary>
			<textarea id='inputDefs' ondrop='textareaFileDrop(event)' ondragover='event.preventDefault()' rows=10 spellcheck='false'>
~~Header 1- Basic types
String Control,a_string,s,,'s' denotes a string control
Number Control,a_number,n,,'n' denotes a number control
Date Control,a_date,dt,,'dt' denotes a date control
List Control,a_list,l,,'l' denotes a homogeneous list control. a 'n' in opts denotes it as a number list.
~~Header 2- Even more basic Types
Enum String Control,an_object.enum_string,s,apple|banana,Having a pipe delimited list in opts creates an enum control.
Enum Number Control,an_object.enum_number,n,1|2|3|4|5,Similar with numbers, the 'n' causes the result to be cast to number in output
Bool Control,an_object.a_bool,b,,'b' denotes a bool control
Json Control,an_object.a_json,j,,'j' denotes a json control
~~Header 3- Arrays
Array Indexing Value 0,indexable.0,s,,Using a number in the path can refer to that index in an array
Array Indexing Value 1 Child Key,indexable.1.obj-in-array,b,,You can even refer to objects inside arrays
~~Header 4- Multi-path
Multi-path string,repeated-string|repeated-string-dup,s,,You can include multiple paths with pipes. The same value will be put to every path.
~~Header 5- Error checking
Invalid Path,myinvalidpath,s,,This path will result in an error
Invalid Branching,an_object.a_json.branch-node.invalidleaf,j,,This is an invalid leaf
~~Header 6- Special Types
Multi,select,m,apple&banana&cottage&doom,'m' denotes a multi select
Objects,objarr,o,,'o' denotes the objects type; an array of objects.
Tables,genobjsArr,o,numcol=n|strcol=s|boolcol=b,'t' type; to be implemented
</textarea>
			<label class='preBuildButton loadFile'>📂<input type='file' accept='.csv,.txt' onchange='loadFileOnTextarea(this)' /></label>
		</details>
		<div id='updateAreas' hidden>
		<details id='updateAreaDets'>
			<summary>Output Json <button onclick='tryUpdate()' title='Update output Json'>🔄</button> <button onclick='save(updateAreaDets,outputFileName.value.length ? outputFileName.value : "output.json")' title='Save Json'>💾</button></summary>
			<textarea id='updateArea' rows=10 spellcheck='false'></textarea>
			<strong>Last Updated</strong>: <span class='areaTimestamp'>Never</span><br>
			<label>Filename: <input id='outputFileName' /></label>
		</details>

		<select id='gotoDef' onchange='gotoDefChange(this.value)'></select>
		<center>
		<button onclick='toggleNotesEditable()'>🔏 Notes</button>
		<button onclick='exportDefsToDialog()' title='Export defs'>📒 Pull Defs</button>
		<button onclick='toggleWideView()'>↔</button>
		<input onchange='document.documentElement.style.setProperty("--fscolor",this.value)' type='color' value='#92cabd' />
		</center></div>
		<center><button class='preBuildButton' onclick='tryBuild()'>🔨 Build</button></center>
	</div>

	<div id='controls'></div>
</div>
