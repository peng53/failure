<html>
<style>
input:required:invalid {
	outline: 1px red solid;
}
input.val, select.val {
	width: 100%;
}
textarea {
	width: 100%;
	resize: vertical;
	white-space: pre;
}
textarea.val {
	width: 100%;
	resize: vertical;
	min-height: 1.5em;
}
.val{
	background: white;
	border: 2px solid #eee;
	border-radius: 5px;
}
body {
	background: #e3e3e3;
	font-family: arial;
	margin: 0;
	overflow: hidden;
}
fieldset {
	background: #92cabd;
	border: 2px solid #5e5252;
	border-radius: 5px;
	margin-bottom: 5px;
}
legend {
	border: 2px solid #5e5252;
	border-radius: 5px;
	background: #5e5252;
	text-transform: capitalize;
	font-weight: bold;
	color: white;
}
details {
	display: inline;
}
details:open {
	display: block;
}

summary:hover, label:hover, button:hover {
	cursor: pointer;
}
input:disabled, select:disabled {
	cursor: not-allowed;
}
#inputJson, #inputDefs, #updateArea {
	border: 2px solid #5e5252;
	border-radius: 5px;	
}
#inputDefs, #defExported textarea {
	line-height: 1.5em;
	font-family: arial;
}
input[type=number], textarea {
	font-family: monospace;
}
h2 {
	font-variant: small-caps;
	text-align: center;
	padding: 0;
	margin: 3px;
}
.notesEd {
	min-width: 100px;
	min-height: 1em;
	display: inline-block;
	background: white;
	outline: 1px solid black;
	padding: 0.5em;
}
dialog {
	bottom: 5px;
	position: fixed;
}
dialog textarea {
	width: 70vw;
	height: 50vh;
}
#container {
	display: grid;
	grid-template-columns: min-content 1fr;
	grid-gap: 1em;
	margin: 3px;
	padding: 0;
	width: calc(100vw - 6px);
	height: calc(100vh - 6px);
}
#controls {
	overflow: auto;
	height: calc(100vh - 1em);
	padding: 5px;
}
#leftPane {
	resize: horizontal;
	overflow: auto;
	height: calc(100vh - 1em);
	padding-right: 15px;
	min-width: 250px;
	max-width: calc(100vw - 2em);
}
.bigSmall {
	display: grid;
	grid-template-columns: 1fr min-content;
	grid-gap: 3px;
}
@media (max-width: 800px){
	#container {
		display: block;
		margin: 0;
	}
	#leftPane {
		height: unset;
		resize: unset;
		min-width: unset;
		position: fixed;
		width: calc(100vw - 1em);
		background: #ccc;
	}
	#controls {
		height: unset;
		padding-top: 3em;
	}
}
</style>
<script>
'use strict';
var myjson = undefined;
var mydefs = undefined;

function defParse(lines){
	const r = new Map();
	const defaultType = 'j';
	let name, path, type, opts, notes;
	let sepCount = 0;
	for (const line of lines){
		if (line.trim().length==0){
			continue;
		}
		if (line.trim().startsWith('~')){
			// separator
			//r[`~sep${sepCount++}`] = {path: line.trim(), type: '~'};
			r.set(`~sep${sepCount++}`,{path: line.trim(), type: '~'});
			continue;
		}
		[name,path,type,opts,notes] = line.split(',');
		//console.log(name,path,type,opts,notes);
		if (!name || !path || name.trim().length==0 || path.trim().length==0){
			console.log(`invalid name "${name}" or invalid path "${path}"`);
			continue;
		}
		if (r.has(name)){
			console.log(`${name} already defined, ignoring`);
			continue;
		} else {
			r.set(name,{path: path, type: type ? type: defaultType, opts: opts, notes: notes});
		}
	}
	return r;
}
function traceJson(j,path){
	const dpath = path.split('.');
	let vnode = j;
	for (const crumb of dpath){
		if (vnode && (typeof vnode == 'object') && crumb in vnode){
			// vnode of the previous loop should always be an object
			// because 'leaves' cannot be midpoints
			vnode = vnode[crumb];
		} else {
			console.error(`lost.. json does not have ${path}`);
			return undefined;
		}
	}
	return vnode;
}
function setJson(j,path,newValue){
	const dpath = path.split('.');
	let pvnode = undefined;
	let vnode = j;
	for (const crumb of dpath){
		if (crumb in vnode){
			pvnode = vnode;
			vnode = vnode[crumb];
		} else {
			console.error(`lost.. json does not have ${path}`);
			return;
		}
	}
	pvnode[dpath[dpath.length-1]] = newValue;
}
function createEnumControl(name,hook,v){
	const tmp = tEnumControl;
	const clone = tmp.content.cloneNode(true);
	const fs = clone.firstElementChild;
	fs.querySelector('.name').textContent = name;
	const sel = fs.querySelector('select');
	for (const e of hook.opts.trim().split('|')){
		sel.appendChild(document.createElement('option')).textContent = e;
	}
	if (v==null){
		fs.querySelector('.valIsNull').checked = fs.querySelector('.val').disabled = true;
	} else {
		fs.querySelector('.val').value = v;
	}
	if (hook.notes && hook.notes.trim().length){
		fs.querySelector('.notes').textContent = hook.notes;
	}
	return fs;
}
function createStringControl(name,hook,v){
	if (hook.opts && hook.opts.trim().length > 0){
		// string is enumerated
		return createEnumControl(name,hook,v);
	}
	const tmp = tStringControl;
	const clone = tmp.content.cloneNode(true);
	const fs = clone.firstElementChild;
	fs.querySelector('.name').textContent = name;
	if (v==null){
		fs.querySelector('.valIsNull').checked = fs.querySelector('.val').disabled = true;
	} else {
		fs.querySelector('.val').value = v;
	}
	if (hook.notes && hook.notes.trim().length){
		fs.querySelector('.notes').textContent = hook.notes;
	}
	return fs;
}
function createBoolControl(name,hook,v){
	const tmp = tBoolControl;
	const clone = tmp.content.cloneNode(true);
	const fs = clone.firstElementChild;
	fs.querySelector('.name').textContent = name;
	Array.from(fs.querySelectorAll('input')).forEach(i=>i.name=name);
	let rinput;
	switch (v){
		case true:
			rinput = '.radioTrue';
			break;
		case false:
			rinput = '.radioFalse';
			break;
		case null:
			rinput = '.radioNull';
			break;
		default:
			rinput = '.radioNull';
			break;
	};
	fs.querySelector(rinput).checked = true;
	if (hook.notes && hook.notes.trim().length){
		fs.querySelector('.notes').textContent = hook.notes;
	}
	return fs;
}
function createNumberControl(name,hook,v){
	// opts has value means enum
	// plan is to allow range via other symbols
	const controlType = (hook.opts && hook.opts.trim().length>0) ? 'enum' : 'num';
	if (controlType=='enum'){
		return createEnumControl(name,hook,v);
	}
	const tmp = tNumberControl;
	const clone = tmp.content.cloneNode(true);
	const fs = clone.firstElementChild;
	fs.querySelector('.name').textContent = name;
	if (v==null){
		fs.querySelector('.valIsNull').checked = fs.querySelector('.val').disabled = true;
	} else {
		fs.querySelector('.val').value = v;
	}
	if (hook.notes && hook.notes.trim().length){
		fs.querySelector('.notes').textContent = hook.notes;
	}
	return fs;
}
function createJsonControl(name,hook,v){
	const tmp = tJsonControl;
	const clone = tmp.content.cloneNode(true);
	const fs = clone.firstElementChild;
	fs.querySelector('.name').textContent = name;
	fs.querySelector('.val').value = JSON.stringify(v,null,3);
	fs.querySelector('.val').rows = Math.min(40, 2 + Array.from(fs.querySelector('.val').value.matchAll('\n')).length);
	if (hook.notes && hook.notes.trim().length){
		fs.querySelector('.notes').textContent = hook.notes;
	}
	return fs;
}
function createDateControl(name,hook,v){
	const tmp = tDateControl;
	const clone = tmp.content.cloneNode(true);
	const fs = clone.firstElementChild;
	fs.querySelector('.name').textContent = name;
	if (v==null){
		fs.querySelector('.valIsNull').checked = fs.querySelector('.val').disabled = true;
	} else {
		fs.querySelector('.val').value = v;
	}
	if (hook.notes && hook.notes.trim().length){
		fs.querySelector('.notes').textContent = hook.notes;
	}
	return fs;
}
function createSep(name,hook){
	const ele = document.createElement('h2');
	ele.textContent = hook.path.replaceAll('~','');
	return ele;
}
function createControl(name,hook,cv){
	// map out function call to type
	const hookMap =
		{'s':createStringControl
		,'b':createBoolControl
		,'n':createNumberControl
		,'j':createJsonControl
		,'dt':createDateControl
	};
	// call function with arguments, default to type 'j' if not available
	return hookMap[(hook.type in hookMap) ? hook.type : 'j'](name,hook,cv)
}
function tryBuild(callbutton){
	try {
		myjson = JSON.parse(inputJson.value);
	} catch (parseErr){
		alert(`Invalid input: ${parseErr.message}`);
		return;
	}
	callbutton.hidden = inputJson.readOnly = inputDefs.readOnly = true;
	console.log('**input json**');
	console.log(myjson);
	mydefs = defParse(inputDefs.value.trim().split('\n'));
	console.log('**input defs**');
	console.log(mydefs);
	console.log('**sound out values in json**');
	let cn = undefined;
	let cv = undefined;
	const afrag = new DocumentFragment();
	//for (const [name,hook] of Object.entries(mydefs)){
	for (const [name,hook] of mydefs.entries()){
		//console.log(traceJson(myjson,hook.path));
		if (hook.type=='~'){
			afrag.appendChild(createSep(name,hook));
		} else {
			cv = undefined;
			cv = traceJson(myjson,hook.path);
			if (cv === undefined){
				// don't create the control if path is not valid
				// prevent trying to update this path
				hook.type = '-';
				continue;
			}
			cn = createControl(name,hook,cv);
			if (cn){
				hook.control = afrag.appendChild(cn);
			}
		}
	}
	controls.appendChild(afrag);
	inputJsonDet.open = inputDefsDet.open = updateAreas.hidden = false;
}
function tryUpdate(){
	let v;
	//for (const [name,hook] of Object.entries(mydefs)){
	for (const [name,hook] of mydefs.entries()){
		v = undefined;
		switch (hook.type){
			case 's':
				v = (hook.control.querySelector('.valIsNull').checked) ? null : hook.control.querySelector('.val').value;
				break;
			case 'n':
				v = (hook.control.querySelector('.valIsNull').checked) ? null : Number(hook.control.querySelector('.val').value);
				break;
			case 'b':
				v = JSON.parse(hook.control.querySelector('input:checked').value);
				break;
			case 'j':
				v = hook.control.querySelector('.val').value;
				try {
					v = JSON.parse((v.length>0) ? v : null);
				} catch (parseErr){
					alert(`Validate '${name}' : '${parseErr.message}'`);
					hook.control.scrollIntoView();
					return;
				}
				break;
			case 'dt':
				v = (hook.control.querySelector('.valIsNull').checked) ? null : hook.control.querySelector('.val').value;
				break;
			default:
				console.log(`skipping type ${hook.type}`);
				break;
		}
		if (v!==undefined){
			console.log(`updating ${name} at ${hook.path} to ${v}`);
			setJson(myjson,hook.path,v);
		}
	}
	updateArea.value = JSON.stringify(myjson,null,3);
	Array.from(document.querySelectorAll('dialog:open')).forEach(d=>d.close());
	updateAreaDets.open = true;
	updateAreaDets.scrollIntoView();
}

function toggleNull(rele){
	const valEle = rele.parentElement?.parentElement?.querySelector('.val');
	if (valEle){
		valEle.disabled = rele.checked;
	}
}
function validateFormat(rele){
	const valEle = rele.parentElement?.querySelector('.val');
	try {
		let j = JSON.parse(valEle.value);
		valEle.value = JSON.stringify(j,null,3);
		valEle.rows = Math.min(40, 2 + Array.from(valEle.value.matchAll('\n')).length);
	} catch(err){
		alert(`JSON is not valid: ${err.message}`);
	}
}
function toggleNotesEditable(){
	const notes = Array.from(controls.querySelectorAll('.notes'));
	const mode = controls.querySelector('.notesEd') ? 'false' : 'plaintext-only';
	notes.forEach(n=>{
		n.classList.toggle('notesEd');
		n.contentEditable = mode;
	});
}
function pullDefs(){
	const r = [];
	const hookSet = new Set(['s','n','j','b','dt']);
	let notes;
	for (const [name,hook] of mydefs.entries()){
		if (hook.type=='~'){
			r.push(hook.path);
		} else if (hookSet.has(hook.type)){
			notes = hook.control.querySelector('.notes').textContent.replace(',',';');
			r.push(`${name},${hook.path},${hook.type},${hook.opts? hook.opts: ''},${notes}`);
		} else {
			// ignored
		}
	}
	return r;
}
function exportDefsToDialog(){
	const r = pullDefs();
	defExported.querySelector('textarea').value = r.join('\n');
	Array.from(document.querySelectorAll('dialog:open')).forEach(d=>d.close());
	defExported.show();
}
</script>
<body>
<div id='container'>
	<div id='leftPane'>
		<details id='inputJsonDet' open>
			<summary>Input Json</summary>
			<textarea id='inputJson' rows=15>
{
	"name": "james",
	"age": 24,
	"pets": [],
	"location": {
		"x": 24,
		"y": 59,
		"z": 4823
	},
	"gender": null,
	"donated": null,
	"birthdate":"2019-10-01T01:01",
	"array": [
		{ 
			"key1": "my first key",
			"key2": 2
		},
		{
			"element": null
		},
		10,
		true
	]
}
			</textarea>
		</details>
		<details id='inputDefsDet' open>
			<summary>Input Defs</summary>
			<textarea id='inputDefs' rows=15>
~~personal info
name,name,s,,name goes here
age,age,n,23|24|25,number field
pets,pets,j,,any json here
birthday,birthdate,dt,
~~location info
x,location.x,n
y,location.y,n
z,location.z,n
~~metadata

donated,donated,b,,boolean true false or null
~~array test
key1,array.0.key1,s,
array[2],array.2,j,
			</textarea>
		</details>
		<details id='updateAreaDets'>
			<summary>Output Json</summary>
			<textarea id='updateArea' rows=25></textarea>
		</details>
		<center><button onclick='tryBuild(this)'>Build</button></center>
		<div id='updateAreas' hidden><center>
		<button onclick='tryUpdate()'>Update Json</button>
		<button onclick='toggleNotesEditable()'>Unlock Notes</button>
		<button onclick='exportDefsToDialog()'>Pull Defs</button>
		</center></div>
	</div>

	<div id='controls'></div>
</div>
</body>

<dialog id='defExported'>
<h2>Defs Export</h2>
<textarea></textarea>
<center><button onclick='this.parentElement?.parentElement?.close()'>Close</button></center>
<center><button command='close' commandfor='defExported'>x</button></center>
</dialog>

<template id='tStringControl'>
	<fieldset>
		<legend class='name'>Name</legend>
		<div class='bigSmall'>
		<label class='valLabel'><i>string</i> <input class='val' placeholder='{empty string}'></label>
		<label>null <input class='valIsNull' type='checkbox' onclick='toggleNull(this)'></label>
		</div>
		<span class='notes'></span>
	</fieldset>
</template>
<template id='tEnumControl'>
	<fieldset>
		<legend class='name'>Name</legend>
		<div class='bigSmall'>
		<label><i>enum</i> <select class='val'> </select></label>
		<label>null <input class='valIsNull' type='checkbox' onclick='toggleNull(this)'></label>
		</div>
		<span class='notes'></span>
	</fieldset>
</template>
<template id='tNumberControl'>
	<fieldset>
		<legend class='name'>Name</legend>
		<div class='bigSmall'>
		<label><i>number</i> <input class='val' type='number' step='0.01' placeholder='0' required></label>
		<label>null <input class='valIsNull' type='checkbox' onclick='toggleNull(this)'></label>
		</div><span class='notes'></span>
	</fieldset>
</template>
<template id='tBoolControl'>
	<fieldset>
		<legend class='name'>Name</legend>
		<i>bool</i>
		<label><input class='radioTrue' type='radio' value='true'> true</label>
		<label><input class='radioFalse' type='radio' value='false'> false</label>
		<label><input class='radioNull' type='radio' value='null'> null</label>
		<br><span class='notes'></span>
	</fieldset>
</template>
<template id='tJsonControl'>
	<fieldset>
		<legend class='name'>Name</legend>
		<div class='bigSmall'>
		<label><i>json</i> <textarea class='val' placeholder='null'></textarea></label>
		<button onclick='validateFormat(this)'>Validate<br>&amp;Format</button>
		</div>
		<span class='notes'></span>
	</fieldset>
</template>
<template id='tDateControl'>
	<fieldset>
		<legend class='name'>Name</legend>
		<div class='bigSmall'>
		<label><i>date</i> <input class='val' type='datetime-local'></label>
		<label>null <input class='valIsNull' type='checkbox' onclick='toggleNull(this)'></label>
		</div>
		<span class='notes'></span>
	</fieldset>
</template>
</html>
