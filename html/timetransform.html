<html>
<head>
	<style>
	body {
		margin: 0;
	}
	#textareas {
		height: calc(100vh - 30px);
	}
	#buttons {
		height: 25px;
	}
	#notes, #out {
		margin: 0;
		height: 100%;
		width: 49%;
		resize: none;
	}
	</style>
</head>

<body>
	<div id='buttons'>
		<button onclick='insertTime()'>InsTime</button>
		<button onclick='quickInsert(100)'>Ins100</button>
		<button onclick='formatNotes()'>ProcessLines</button>
		<button onclick='formatNotesX()'>FormatX</button>
	</div>

	<div id='textareas'>
		<center>
		<textarea id='notes'></textarea>
		<textarea id='out'></textarea>
		</center>
	</div>
</body>
<script>

let mline = /^(\d+:\d+ [AP]M \d+\/\d+\/\d+.\d+)\n(\d+)\n(\d+:\d+ [AP]M \d+\/\d+\/\d+.\d+)/gm;

function tupleize(lines, keys, keyMapped){
	const out = [];
	const tSize = keys.length;
	let tupOut;
	for (let i=0,l=lines.length; i<l; i+=tSize+1){
		tupOut = {};
		for (let k=0;k<tSize;++k){
			if (lines[i+k].length == 0){
				console.log('missing key at line ,', i+k);
				break;
			} else {
				tupOut[keys[k]] = (keyMapped[k]) ? keyMapped[k](lines[i+k]) : lines[i+k];
			}
		}
		out.push(tupOut);
	}
	return out;
}


function processStamps(stamps, fmt){
	let out = '';
	let total;
	for (let i=0,s=stamps.length; i<s; ++i){
		if (i>0){
			total = (stamps[i].start - stamps[i-1].end)/60000;
			if (total>0){
				out += fmt({start:stamps[i-1].end, end:stamps[i].start, code: ''}, total)+'\n';
			}
		}
		total = (stamps[i].end - stamps[i].start)/60000;
		if (total>0){
			out += fmt(stamps[i], total)+'\n';
		}
	}
	return out;
}

function timeLineX(t, total){
	return leftPadded(t.code,4,' ')+' '+niceTime(t.start,':')+'  '+niceTime(t.end,':')+' '+leftPadded((total/60).toFixed(2),5,' ');
}

function formatNotesX(){
	const lines = notes.value.split('\n');
	const dp = (d) => new Date(Date.parse(d));
	const eventStamps = tupleize(lines, ['start', 'code', 'end'], [dp, undefined, dp]);
	out.value = 'Time Records\n';
	out.value += processStamps(eventStamps, timeLineX);
}




function parseTimes(lines, nullcode){
	const codes = {};
	const times = [];
	let start, end, code, total;
	if (nullcode) codes[nullcode] = 0;
	for (let i=0,m=lines.length;i<m;i+=4){
		if (lines[i].length==0 || lines[i+1].length==0 || lines[i+2].length==0){
			break;
		}
		start = new Date(Date.parse(lines[i]));
		if (end && nullcode){
			total = (start-end)/60000;
			if (total>0){
				codes[nullcode] += total;
				times.push({code:nullcode, start, end, total});
			}
		}
		code = lines[i+1];
		end = new Date(Date.parse(lines[i+2]));
		total = (end-start)/60000;
		if (total>0){
			if (code in codes==false) codes[code] = 0;
			codes[code] += total;
			times.push({code,start,end,total});
		}
	}
	return [times,codes];
}

function outputTimes(times,fmt){
	let out='CODE START   STOP  DIFF\n';
	for (let i=0,l=times.length; i<l; ++i){
		out+=fmt(times[i])+'\n';
	}
	return out;
}
function outputTotals(totals){
	let out='Totals\n------\n';
	for (let v in totals){
		out += v+': '+totals[v]+'\n';
	}
	return out;
}

function timeLine(t){
	return leftPadded(t.code,4,' ')+' '+niceTime(t.start,':')+'  '+niceTime(t.end,':')+' '+leftPadded((t.total/60).toFixed(2),5,' ');
}

function niceTime(td, sep){
	let out = ''
	if (td.getHours()<10) out += ' ';
	out += td.getHours() + sep;
	if (td.getMinutes()<10)	out += '0';
	out += td.getMinutes();
	return out;
}
function leftPadded(val, len, pad){
	return pad.repeat(len-val.length)+val;
}
function quickInsert(what){
	notes.value += what + '\n';
}
function insertTime(){
	let d = new Date();
	notes.value += date2line(d) + '\n';
}
function date2line(date){
	return date.toLocaleTimeString(undefined,{'hour':'numeric','minute':'2-digit'})+' '+date.toLocaleDateString();
}

function formatNotes(){
	let lines = notes.value.split('\n');
	let [times, codes] = parseTimes(lines, 'x');
	out.value = 'Time Record\n-----------\n'+outputTimes(times, timeLine);
	out.value += '\n'+outputTotals(codes);
}

{
	notes.value ='';
	let t = new Date();
	for (let i=0;i<20;++i){
		notes.value += date2line(t) + '\n' + (100+i).toString() + '\n';
		t = new Date(t.getTime()+i*5*60000);
		notes.value += date2line(t);
		if (i<19) notes.value += '\n\n';
	}
}
</script>
</html>
