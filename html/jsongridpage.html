<html>
<style>
body {
	margin: 0;
}
#main {
	display: grid;
	grid-template-rows: max-content 1fr;
	width: 100vw;
	grid-gap: 1em;
	height: 95vh;
}
#pane {
	margin: 2px;
	display: flex;
	flex-direction: row;
	flex-wrap: nowrap;
	width: calc(100% - 4px);
	overflow-x: auto;
	height: 100%;
	font-size: 1.5em;
}
#items {
	height: 100%;
	overflow: auto;
}
#pane span {
	display: inline-block;
	background: #ccc;
	text-wrap: nowrap;
	margin: 2px 2px 10px 2px;
	border-radius: 5px;
}
.itemTN {
	border: 3px solid yellow;
	border-radius: 6px;
	object-fit: contain;
	height: 126px;
}
.itemTitle:hover {
	height: unset;
}
.itemHighlight {
	background: #ccc;
}
</style>

<style id='itemThumbnails' disabled>
#items {
	display: flex;
	flex-flow: wrap;
}
.item {
	/*border: 1px inset #000;*/
	width: 120px;
	margin: 10px;
	/*height: 200px;*/
	display: grid;
	grid-template-rows: min-content 1fr;
	grid-gap: 4px;
}
.itemTN {
	width: 120px;

}
.itemTitle {
	display: block;
	font-weight: bold;
	text-align: center;
	color: black;
	text-decoration: none;
	font-size: 0.8em;
	overflow-wrap: break-word;
	width: 130px;
	height: 1.2em;
	overflow: hidden;
}

.itemTags {
	display: none;
}
.itemhref {
	color: black;
	text-decoration: none;
}
.itemhref:hover {
	text-decoration: underline;
	color: purple;
}
</style>


<style id='itemList'>

#items {
	display: grid;
	grid-auto-rows: min-content;
	grid-gap: 10px;
	grid-template-columns: 1fr;
}
.item {
	/*height: 160px;*/
	width: calc(100% - 20px);
	margin: 0 10px;
	display: grid;
	grid-template-areas: 
		"a b"
		"a c";
	grid-template-columns: 120px 1fr;
	grid-template-rows: min-content 1fr;
	grid-gap: 10px;
}
.itemTN {
	width: 120px;

	grid-area: a;
}
.itemTitle {
	display: block;
	font-weight: bold;
	font-size: 1.2em;
	text-align: left;
	color: black;
	text-decoration: none;
	grid-area: b;
	overflow-wrap: break-word;
	word-wrap: nowrap;
	overflow: hidden;
	height: 1em;
	width: unset;
}
.itemTags {
	/*display: flex;
	flex-flow: wrap;
	*/
	display: block;
	grid-area: c;
	width: 100%;
	height: 100%;
}
.tag {
	margin: 2px;
}
.tag:nth-child(n+2) {
	background: red;
}
.tag:nth-child(n+3) {
	background: lime;
}
.tag:nth-child(n+4) {
	background: yellow;
}
.tag:nth-child(n+5) {
	background: orange;
}
.tag {
	background: aqua;
	border-radius: 5px;
}
.tag:hover {
	filter: invert(100%);
}
.itemhref {
	color: black;
	text-decoration: none;
}
.itemhref:hover {
	text-decoration: underline;
	color: purple;
}
</style>

<template id='item'>
<div class='item'>
<img class='itemTN' onError='this.style.display="hidden"'/>
<span class='itemTitle'></span>
<div class='itemTags'></div>
</div></template>
<template id='tag'>
<span class='tag'></span>
</template>
<body>
<div id='main'>
	<div id='pane'></div>
	<div id='items'></div>
</div>
<button onclick='setItemsStyle("thumbnail")'>Thumbnails</button>
<button onclick='setItemsStyle("list")'>List</button>
<input type='file' id='jfile'/>
</body>
<script>
let tagDB = new Map();
function setItemsStyle(sty){
	switch (sty){
		case 'thumbnail':
			document.querySelector('#itemThumbnails').disabled = false;
			document.querySelector('#itemList').disabled = true;
		break;
		case 'list':
			document.querySelector('#itemThumbnails').disabled = true;
			document.querySelector('#itemList').disabled = false;
		break;
		default: break;
	}
}

function itemsMoveToTop(tag){
	Array.from(items.querySelectorAll('.itemHighlight')).forEach(i=>{
		i.classList.remove('itemHighlight');
	});
	let df = new DocumentFragment();
	
	tagDB.get(tag).forEach(e=>{
		e.classList.add('itemHighlight');
		df.append(e);
	});
	if (df.childElementCount){
		items.insertBefore(df,items.firstChild);
		items.scrollTop = 0;
	}
	
}

const quickTag = function(e){
	itemsMoveToTop(e.target.textContent);
};

function createItem(tn, desc, tags){
	const itemTemp = document.querySelector('#item').content;
	const newItem = itemTemp.cloneNode(true).firstElementChild;
	if (tn){
		newItem.querySelector('.itemTN').src = tn;
	}
	newItem.querySelector('.itemTitle').textContent = desc;
	//newItem.querySelector('.itemhref').href='about:blank';
	const allTags = newItem.querySelector('.itemTags');
	const tagTemp = document.querySelector('#tag').content;
	let tagSpan;
	let paneTag;
	let str_tag;
	for (const tag of tags){
		tagSpan = document.createElement('span');
		tagSpan.textContent = tag;
		tagSpan.classList.add('tag');
		allTags.appendChild(tagSpan);
		str_tag = tag.toString();
		if (!tagDB.has(str_tag)){
			tagDB.set(str_tag,[]);
			paneTag = document.createElement('span');
			paneTag.textContent = str_tag;
			paneTag.addEventListener('click',quickTag);
			pane.appendChild(paneTag);
		}
		tagDB.get(str_tag).push(newItem);
	}
	/*tags.split(',').forEach(t=>{
		//allTags.appendChild(document.createTextNode(t));
		const tagTag = tagTemp.cloneNode(true);
		tagTag.querySelector('.tag').textContent = t;
		tagTag.querySelector('.tag').addEventListener('click',quickTag);
		allTags.appendChild(tagTag);
	});*/
	return newItem;
}
function createItemsCustom(js){
	const p = document.querySelector('#items');
	for (const f of js){
		p.appendChild(createItem(f.thumb,f.name,f.tag));
	}
}
function loadJson(ev){
	const fi = ev.target.files;
	const jf = fi[0];
	const reader = new FileReader();
	const toJson = (e)=>{
		let js  = JSON.parse(e.target.result);
		//console.log(js);
		createItemsCustom(js);
	};
	const onLoad = (jf) =>{
		ev.target.hidden = true;
		return toJson;
	}
	reader.onload = onLoad(jf);
	reader.readAsText(jf);
}
document.getElementById('jfile').addEventListener('change',loadJson, false);
setItemsStyle("thumbnail");

for (let i=0; i<10; i++){
	document.querySelector('#items').appendChild(createItem('wc3_refcard01.jpg',i,'banana,icecream,tacos,cream,cookies'));
}
{
	let p = document.querySelector('#pane');
	for (let t=0; t<30; t++){
	let e = document.createElement('p');
	e.textContent = t;
	pane.appendChild(e);
	}
}*/
const paneClick = function(ev){
	if (ev.target.tagName=='P'){
		const t = ev.target.textContent;
		if (t.length){
			itemsMoveToTop(t);
		}
	}
	ev.preventDefault();
};
pane.addEventListener('click',paneClick);

</script>

</html>
